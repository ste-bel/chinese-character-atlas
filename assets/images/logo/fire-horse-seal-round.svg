<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img"
     aria-label="Chinese Character Atlas — Fire Horse seal">
  <title>Fire Horse seal · 馬</title>
  <!-- Interim Atlas logo: a true round seal built from the VERIFIED character
       馬 (mǎ, horse — the Fire Horse). No AI-generated text. Always circular,
       never stretched. The illustrated / animated 3D Fire Horse medallion
       (see brand/fire-horse-3d/) will replace this via siteSeal(). -->
  <circle cx="100" cy="100" r="97" fill="#F5EDD6"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#BE2416" stroke-width="8"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#BE2416" stroke-width="2.5"/>
  <text x="100" y="108" text-anchor="middle" dominant-baseline="middle"
        font-family="'Noto Serif CJK SC','Source Han Serif CN','STSong','SimSun',serif"
        font-weight="700" font-size="112" fill="#BE2416">馬</text>
</svg>
