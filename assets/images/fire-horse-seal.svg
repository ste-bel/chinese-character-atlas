<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="白朗志远 Fire Horse Seal">
  <!-- Outer border — double rule -->
  <rect x="3" y="3" width="94" height="94" rx="4" ry="4"
        fill="none" stroke="#cc2200" stroke-width="3.5"/>
  <rect x="7" y="7" width="86" height="86" rx="2" ry="2"
        fill="none" stroke="#cc2200" stroke-width="1"/>

  <!-- Background fill (slightly transparent red wash for aged look) -->
  <rect x="7" y="7" width="86" height="86" rx="2" ry="2"
        fill="rgba(204,34,0,0.06)"/>

  <!-- Characters: 白朗 top row, 志远 bottom row -->
  <!-- These are the author's Chinese name: Bái Lǎng Zhì Yuǎn -->
  <text x="25" y="44"
        font-family="'FangSong','STFangsong','SimSun','Noto Serif CJK SC',serif"
        font-size="34" font-weight="bold"
        fill="#cc2200" text-anchor="middle" dominant-baseline="auto">白</text>
  <text x="75" y="44"
        font-family="'FangSong','STFangsong','SimSun','Noto Serif CJK SC',serif"
        font-size="34" font-weight="bold"
        fill="#cc2200" text-anchor="middle" dominant-baseline="auto">朗</text>
  <text x="25" y="82"
        font-family="'FangSong','STFangsong','SimSun','Noto Serif CJK SC',serif"
        font-size="34" font-weight="bold"
        fill="#cc2200" text-anchor="middle" dominant-baseline="auto">志</text>
  <text x="75" y="82"
        font-family="'FangSong','STFangsong','SimSun','Noto Serif CJK SC',serif"
        font-size="34" font-weight="bold"
        fill="#cc2200" text-anchor="middle" dominant-baseline="auto">远</text>

  <!-- Center dividing lines (classic seal grid) -->
  <line x1="50" y1="9" x2="50" y2="91" stroke="#cc2200" stroke-width="0.8" opacity="0.5"/>
  <line x1="9" y1="50" x2="91" y2="50" stroke="#cc2200" stroke-width="0.8" opacity="0.5"/>
</svg>
