<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Search — Chinese Character Atlas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/chinese-character-atlas/assets/css/style.css">
<!-- Pagefind UI — generated by npm run pagefind -->
<link rel="stylesheet" href="/chinese-character-atlas/pagefind/pagefind-ui.css">
<style>
  :root {
    --pagefind-ui-primary:       #8b3a0f;
    --pagefind-ui-text:          #2c1810;
    --pagefind-ui-background:    #ffffff;
    --pagefind-ui-border:        #ddc7a1;
    --pagefind-ui-tag:           #f5ead0;
    --pagefind-ui-border-width:  1px;
    --pagefind-ui-border-radius: 10px;
    --pagefind-ui-font:          Georgia, "Times New Roman", serif;
  }
</style>
</head>
<body>
<header data-pagefind-ignore>
  <h1>Chinese Character Atlas</h1>
  <p>Every character tells a story. Every story opens a civilization.</p>
</header>

<main>
  <nav class="card" data-pagefind-ignore>
    <a href="/chinese-character-atlas/">Home</a> ·
    <a href="/chinese-character-atlas/lessons/">Lessons</a> ·
    <a href="/chinese-character-atlas/words/">Words</a> ·
    <a href="/chinese-character-atlas/characters/">Characters</a> ·
    <a href="/chinese-character-atlas/components/">Components</a> ·
    <a href="/chinese-character-atlas/search.html">Search</a>
  </nav>

  <section class="card">
    <div id="search"></div>
  </section>

  <noscript>
    <section class="card">
      <p>Search requires JavaScript. Please enable JavaScript to search the Atlas.</p>
    </section>
  </noscript>
</main>

<footer data-pagefind-ignore>
  <p>© 2026 Stéphane Bélanger (白朗志远) · Chinese Character Atlas</p>
  <p>Content: <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a> · Engine: <a href="https://opensource.org/licenses/MIT">MIT</a></p>
</footer>

<script type="module">
  import { PagefindUI } from "/chinese-character-atlas/pagefind/pagefind-ui.js";
  new PagefindUI({
    element:          "#search",
    baseUrl:          "/chinese-character-atlas",
    bundlePath:       "/chinese-character-atlas/pagefind/",
    showImages:       false,
    showEmptyFilters: false,
    resetStyles:      false,
    excerptLength:    30,
    translations: {
      placeholder: "Search 是, shì, W0001, component…",
      zero_results: "No results for [SEARCH_TERM].",
    },
  });
</script>
</body>
</html>
