name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Validate content
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Index (Pagefind)
        run: npm run pagefind

      - name: Verify output
        run: |
          echo "=== Build output ==="
          ls docs/
          echo "=== Search index entry count ==="
          node -e "const d = JSON.parse(require('fs').readFileSync('docs/search-index.json','utf8')); console.log(d.length + ' entries');"
          echo "=== Statistics ==="
          cat docs/statistics.json
